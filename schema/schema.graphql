type Area {
	mbid: UUID!
	name: String!
	disambiguation: String
	type: Int
	ended: Boolean!
	beginDate: PartialDate
	endDate: PartialDate
	isoCode1: [String!]!
	isoCode2: [String!]!
	isoCode3: [String!]!
	tags: [Tag!]!
	annotation: String
}

type Artist {
	mbid: UUID!
	name: String!
	sortName: String!
	disambiguation: String
	type: Int
	gender: Int
	ended: Boolean!
	beginDate: PartialDate
	endDate: PartialDate
	releaseGroups: [ReleaseGroup!]!
	releases: [Release!]!
	tags: [Tag!]!
	rating: Rating
	genres: [Genre!]!
	annotation: String
	area: Area
	beginArea: Area
	endArea: Area
}

type ArtistCredit {
	name: String!
	joinPhrase: String!
	artist: Artist
}

type Genre {
	mbid: UUID!
	name: String!
	disambiguation: String
}

type Label {
	mbid: UUID!
	name: String!
	disambiguation: String
	type: Int
	ended: Boolean!
	beginDate: PartialDate
	endDate: PartialDate
	release: [Release!]!
	rating: Rating
	genres: [Genre!]!
	annotation: String
}

type LabelInfo {
	catalogNumber: String
	label: Label
}

type Medium {
	mbid: UUID!
	format: Int
	position: Int!
	name: String!
	trackCount: Int!
	tracks: [Track!]!
}

type PartialDate {
	year: Int
	month: Int
	day: Int
}

type QueryRoot {
	artist(mbid: String!): Artist
	artists(mbids: [String!]!): [Artist!]!
	releaseGroup(mbid: String!): ReleaseGroup
	releaseGroups(mbids: [String!]!): [ReleaseGroup!]!
	release(mbid: String!): Release
	releases(mbids: [String!]!): [Release!]!
	recording(mbid: String!): Recording
	recordings(mbids: [String!]!): [Recording!]!
	label(mbid: String!): Label
	labels(mbids: [String!]!): [Label!]!
	area(mbid: String!): Area
	areas(mbids: [String!]!): [Area!]!
}

type Rating {
	value: Int!
	votesCount: Int
}

type Recording {
	mbid: UUID!
	name: String!
	disambiguation: String
	length: Int
	video: Boolean!
	firstReleaseDate: PartialDate
	isrc: String
	release: [Release!]!
	rating: Rating
	artistCredit: [ArtistCredit!]!
	genres: [Genre!]!
	annotation: String
}

type Release {
	mbid: UUID!
	name: String!
	status: Int
	packaging: Int
	quality: Int!
	language: Int
	script: Int
	barcode: String
	disambiguation: String
	date: PartialDate
	asin: [String!]
	country: String
	releaseGroup: ReleaseGroup
	labelInfo: [LabelInfo!]!
	medium: [Medium!]!
	releaseEvents: [ReleaseEvent!]!
	artistCredit: [ArtistCredit!]!
	genres: [Genre!]!
	annotation: String
}

type ReleaseEvent {
	date: PartialDate
	country: Int
}

type ReleaseGroup {
	mbid: UUID!
	name: String!
	disambiguation: String
	type: Int
	secondaryType: [Int!]
	firstReleaseDate: PartialDate
	releases: [Release!]!
	rating: Rating
	artistCredit: [ArtistCredit!]!
	genres: [Genre!]!
	annotation: String
}

type Tag {
	name: String!
	count: Int!
}

type Track {
	mbid: UUID!
	name: String!
	number: String!
	position: Int!
	length: Int
	recording: Recording
	artistCredit: [ArtistCredit!]
}

"""
A UUID is a unique 128-bit number, stored as 16 octets. UUIDs are parsed as
Strings within GraphQL. UUIDs are used to assign unique identifiers to
entities without requiring a central allocating authority.

# References

* [Wikipedia: Universally Unique Identifier](http://en.wikipedia.org/wiki/Universally_unique_identifier)
* [RFC4122: A Universally Unique Identifier (UUID) URN Namespace](http://tools.ietf.org/html/rfc4122)
"""
scalar UUID

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Provides a scalar specification URL for specifying the behavior of custom scalar types.
"""
directive @specifiedBy(url: String!) on SCALAR
schema {
	query: QueryRoot
}
